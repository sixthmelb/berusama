name: Python Tests & Linting

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.7", "3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Lint with flake8 (critical errors only)
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --exclude=.venv,.git,__pycache__ --count --select=E9,F63,F7,F82 --show-source --statistics
    
    - name: Lint with flake8 (all issues)
      run: |
        # Exit-zero treats all errors as warnings for informational purposes
        flake8 . --exclude=.venv,.git,__pycache__ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Run tests with pytest
      run: |
        pytest -v --tb=short